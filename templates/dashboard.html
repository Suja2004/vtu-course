<!doctype html>
<html>
  <head>
    <title>Dashboard</title>

    <style>
      body {
        font-family: Arial;
        background: #f5f7fb;
        padding: 20px;
      }

      .module {
        background: white;
        padding: 15px;
        margin-bottom: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }

      .lecture {
        display: flex;
        justify-content: space-between;
        padding: 10px;
        border-bottom: 1px solid #eee;
      }

      .completed {
        color: green;
      }
      .not-completed {
        color: red;
      }

      button {
        background: #4caf50;
        color: white;
        border: none;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
      }
    </style>

    <script>
      function completeLecture(id) {
        const cookie = document.getElementById("cookie").value;
        const course = document.getElementById("course").value;

        fetch("/complete", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: `lecture_id=${id}&cookie=${encodeURIComponent(cookie)}&course=${course}`,
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "expired") {
              alert("Cookie expired");
              window.location.href = "/";
            } else {
              alert("Completed!");
              location.reload();
            }
          });
      }
    </script>
  </head>

  <body>
    <a
      href="/"
      style="padding: 8px; background: #333; color: white; border-radius: 5px"
      >⬅ Home</a
    >

    <h1>{{ data.title }}</h1>

    <input type="hidden" id="cookie" value="{{ request.form.cookie }}" />
    <input type="hidden" id="course" value="{{ request.form.course }}" />

    {% for lesson in data.lessons %}
    <div class="module">
      <h3>{{ lesson.title }}</h3>

      {% for lec in lesson.lectures %}
      <div class="lecture">
        <div>
          ▶ {{ lec.title }} <br />
          ⏱ {{ lec.duration_minutes }} min | 📊 {{ lec.percent }}%
        </div>

        <div>
          {% if lec.is_completed %}
          <span class="completed">✅ Done</span>
          {% else %}
          <span class="not-completed">❌ Pending</span>
          <button onclick="completeLecture('{{ lec.id }}')">Complete</button>
          {% endif %}
        </div>
      </div>
      {% endfor %}
    </div>
    {% endfor %}
  </body>
</html>
